services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      PORT: 4000
      ALPHATekX_API_KEY: ${ALPHATekX_API_KEY:-alpha-tekx-enterprise-key}
      ALPHATekX_API_KEYS: ${ALPHATekX_API_KEYS:-}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://placeholder.supabase.co}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-placeholder}
        VITE_PAYSTACK_PUBLIC_KEY: ${VITE_PAYSTACK_PUBLIC_KEY:-pk_placeholder}
    depends_on:
      - backend
    ports:
      - "80:80"
