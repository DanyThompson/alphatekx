#cloud-config
package_update: true
package_upgrade: false
packages:
  - git
  - curl
  - ca-certificates
  - gnupg
  - lsb-release
runcmd:
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker
  - curl -L "https://github.com/docker/compose/releases/download/v2.29.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
  - chmod +x /usr/local/bin/docker-compose
  - mkdir -p /opt/alphatekx
  - cd /opt/alphatekx
  - git clone https://github.com/YOUR_GITHUB_USER/YOUR_REPO_NAME.git .
  - echo "Deployment scripts installed. Run /opt/alphatekx/deploy/deploy.sh after editing your environment values." > /root/cloud-init-done.txt
